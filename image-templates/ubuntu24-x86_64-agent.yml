# image-templates/ubuntu24-x86_64-agent.yml
# MAH-style edge raw image with agent install scripts under /opt/agent.
#
# After boot (pick one stack; do not run both on the same node without planning):
#   sudo /opt/agent/agent-install.sh          # Intel + Hermes/OpenClaw (+ optional SuperClaw ctl)
#   sudo /opt/agent/agent-install-nvidia.sh   # NVIDIA + Hermes/OpenClaw (+ optional NemoClaw)
#   sudo INSTALL_SUPERCLAW_CTL=1 /opt/agent/agent-install.sh
#   sudo INSTALL_NEMOCLAW=1 /opt/agent/agent-install-nvidia.sh
# After flashing this image to a larger disk, grow rootfs to fill it:
#   sudo /opt/agent/extend-storage.sh          # grow last partition + resize ext4 rootfs
# FORCE=1 re-runs stamped custom steps. Requires network and mutable root (immutability off).
# Behind a proxy? The scripts have no built-in proxy URLs: export http_proxy/https_proxy (sudo -E)
#   or pass AGENT_INSTALL_HTTP_PROXY/AGENT_INSTALL_HTTPS_PROXY; do not rely on script defaults.
# Package/step coverage: docs/tutorial/ubuntu24-agent-install-scripts.md

metadata:
  description: Ubuntu 24.04 edge agent image with Intel and NVIDIA post-install scripts
  use_cases:
    - Post-install agent stack via agent-install.sh or agent-install-nvidia.sh
    - Intel OpenVINO / oneAPI or NVIDIA CUDA edge nodes
    - IoT gateway with optional runtime package add-ons
  keywords:
    - edge
    - agent
    - hermes
    - openclaw
    - superclaw
    - nemoclaw
    - openvino
    - mah
    - ubuntu
    - intel
    - nvidia
    - cuda

image:
  name: edge-os-image-ubuntu-agent
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

disk:
  name: edge-agent
  artifacts:
    - type: raw
      compression: gz
  size: 4GiB
  partitionTableType: gpt
  partitions:
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

