# AI-searchable metadata for template discovery
metadata:
  description: Ubuntu 24.04 raw image (edge baseline) with initrd hello dracut hook (bb)
  use_cases:
    - Validating custom dracut initqueue hooks in UKI initramfs
    - Ubuntu 24.04 immutable raw edge builds with bb initrd marker
  keywords:
    - bb
    - dracut
    - initrd
    - hello
    - ubuntu
    - raw

image:
  name: bb-os-image-ubuntu
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

# Sample list of additional package repositories; replace codename, url, and pkey values as needed
packageRepositories:
  - codename: "company-internal"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config
    component: "main"

  - codename: "dev-tools"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config

  - codename: "intel-openvino"
    url: "<URL>"
    pkey: "<PUBLIC_KEY_URL>" # Uncomment and replace in real config
    component: "restricted"

  # - codename: "localdeb"
  #   path: "/data/image-composer-tool/localdeb" # Uncomment and replace with local path
  #   pkey: "[trusted=yes]" # Make sure to put trusted
  #   component: "main" # Make sure to put main or leave empty

systemConfig:
  name: bb
  description: edge ubuntu raw image with initrd hello dracut module

  immutability:
    enabled: true # default is true
    # To enable Secure Boot, provide the actual file paths for your environment below and uncomment the relevant lines.
    # secureBootDBKey: "<SECURE_BOOT_DB_KEY_PATH>"
    # secureBootDBCrt: "<SECURE_BOOT_DB_CRT_PATH>"
    # secureBootDBCer: "<SECURE_BOOT_DB_CER_PATH>"

  packages:
    - ubuntu-minimal
    - systemd-boot
    - dracut-core
    - systemd
    - cryptsetup-bin
    - openssh-server
    - systemd-resolved
    - systemd-timesyncd

  additionalFiles:
    - local: additionalfiles/ubuntu24-bb/hello.conf
      final: /etc/dracut.conf.d/hello.conf
    - local: additionalfiles/ubuntu24-bb/99hello/module.sh
      final: /usr/lib/dracut/modules.d/99hello/module.sh
    - local: additionalfiles/ubuntu24-bb/99hello/hello.sh
      final: /usr/lib/dracut/modules.d/99hello/hello.sh
    - local: additionalfiles/ubuntu24-bb/99hello/hello-run.sh
      final: /usr/lib/dracut/modules.d/99hello/hello-run.sh
    - local: additionalfiles/ubuntu24-bb/hello.sh
      final: /usr/local/sbin/hello.sh

  configurations:
    - cmd: "chmod 755 /usr/local/sbin/hello.sh /usr/lib/dracut/modules.d/99hello/hello.sh /usr/lib/dracut/modules.d/99hello/hello-run.sh"

  kernel:
    version: "6.17"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-generic-hwe-24.04
