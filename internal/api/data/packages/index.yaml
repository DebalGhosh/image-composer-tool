# Package-index inventory. Enumerates every (os, arch) shard the /api/v1/packages
# endpoint knows about. Generated by `cmd/ict-index` from the source repos the
# ICT team hosts on GitHub; hand-edited only for the initial seed while those
# source repos are still being spun up.
#
# Schema:
#   shards:
#     - os:            <target dist id, matching Manifest.Targets[].id>
#       arch:          <cpu arch, matching Manifest.Targets[].arch>
#       file:          <basename under this directory>
#       package_count: <int, informational>
#       generated_at:  <RFC3339 timestamp>
#
# An empty shards list is legal and means "index not built yet"; the handler
# returns 200 with an empty result set + X-Package-Index-Missing header so the
# UI can render a helpful fallback.

shards:
  - os: ubuntu24
    arch: amd64
    file: ubuntu24-amd64.json
    package_count: 32
    generated_at: 2026-07-20T00:00:00Z
