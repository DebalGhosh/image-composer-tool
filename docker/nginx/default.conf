# ICT web UI — nginx config for the frontend container.
#
# Serves the Vite build at / and reverse-proxies /api/ (plus the SSE
# build-log stream) to the backend service. Same-origin, so the Go
# server needs no CORS middleware.
#
# Two subtle things that MUST be right for the SSE log stream to work:
#
#   1. proxy_buffering off  — otherwise nginx accumulates the SSE bytes in
#      its own buffer and the browser sees the log all at once at the end,
#      or (worse) times out silently while the stream is still writing.
#
#   2. proxy_read_timeout is bumped from 60s to 1h so an idle SSE
#      connection (build in a slow chroot for 30 min) doesn't get 502'd.
#
#   3. Chunked transfer stays on and Connection is closed after upstream —
#      the backend's SSE writer flushes per event, not per response body.

upstream backend {
    server backend:8080;
    keepalive 16;
}

server {
    # 8080 because nginx-unprivileged doesn't bind privileged ports.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip only for static text/JS/CSS/SVG — don't waste cycles on already-
    # compressed assets.
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml;
    gzip_min_length 512;
    gzip_vary on;

    # Long-lived cache for hashed assets/, short for the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any client-side route should return index.html so the
    # React router picks it up. Don't fall through to /api paths — that's
    # matched below with higher specificity anyway.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API + SSE.
    #
    # trailing slash on both sides — nginx strips /api/ from the URI and
    # forwards to the backend's /api/... path prefix intact (proxy_pass
    # without a URI would preserve the /api/ prefix; WITH a URI it
    # replaces it). We DO want to preserve the prefix (the Go router is
    # registered at /api/v1/...), so no trailing slash on proxy_pass.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: no buffering, generous timeout, close-on-empty
        # so mid-stream disconnects propagate to the backend context
        # (letting our /cancel logic actually take effect).
        proxy_buffering              off;
        proxy_cache                  off;
        proxy_read_timeout           1h;
        proxy_send_timeout           1h;
        chunked_transfer_encoding    on;

        # SSE handshakes are HTTP/1.1 — the "Connection: close" header
        # the client sometimes sends would kill keepalive; strip it so
        # our upstream keepalive pool actually reuses sockets.
        proxy_set_header Connection "";
    }
}
