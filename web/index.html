<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Composer Tool</title>
    <script>
      // Apply the persisted theme class BEFORE React mounts so dark-mode
      // users don't see a light flash on cold reload. Kept intentionally
      // synchronous and side-effect-only.
      (function () {
        try {
          var s = localStorage.getItem('ict.theme');
          var d =
            s === 'dark' ||
            (!s && window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (d) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
